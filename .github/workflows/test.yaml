name: Testing

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Tests pass
    runs-on: ubuntu-latest

    steps:
      - name: (>) Git checkout
        uses: actions/checkout@v4

      - name: (>) Enable Corepack
        run: corepack enable

      - name: (>) Set up Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: (>) Install dependencies
        run: pnpm install --frozen-lockfile

      - name: (>) Run tests
        run: pnpm test
