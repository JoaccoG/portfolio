name: Code audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  audit:
    name: Code audit
    runs-on: ubuntu-latest

    steps:
      - name: (>) Git checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: (>) Cache "node_modules"
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: (>) Check that ".editorconfig" exists
        uses: andstor/file-existence-action@v1
        with:
          files: '.editorconfig'

      - name: (>) EditorConfig validation
        run: npx eclint check src/** mocks/**

      - name: (>) Check "node_modules" is ignored
        uses: dkershner6/gitignore-parser@v1
        with:
          must_deny: 'node_modules'

      - name: (>) Install dependencies
        run: npm ci

      - name: (>) ESLint validation
        run: npx eslint .

      - name: (>) Check commit message length
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^[^#].{8,120}'
          error: 'The commit message must have between 8 and 120 characters.'
          excludeDescription: 'true'
          excludeTitle: 'true'
          checkAllCommitMessages: 'true'
